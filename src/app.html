<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- <link rel="stylesheet" href="%sveltekit.assets%/favicon.png" /> -->
		<link rel="icon" href="https://fav.farm/%F0%9F%9A%80" />
		<link
			rel="prefetch"
			href="/fonts/Virgil.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(() => {
				const storageKey = 'tokiory-theme';
				const themes = ['light', 'dark', 'gruvvy'];
				const root = document.documentElement;

				let nextTheme = 'light';

				try {
					const savedTheme = window.localStorage.getItem(storageKey);
					if (savedTheme && themes.includes(savedTheme)) {
						nextTheme = savedTheme;
					}
				} catch {
					nextTheme = 'light';
				}

				root.classList.remove('theme-light', 'theme-dark', 'theme-gruvvy');
				root.classList.add(`theme-${nextTheme}`);
				root.style.colorScheme = nextTheme === 'light' ? 'light' : 'dark';
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
